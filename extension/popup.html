<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beacon</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --error: #ef4444;
      --border: #334155;
    }

    body {
      width: 380px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-main);
      box-sizing: border-box;
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-badge.connected {
      background-color: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-badge.disconnected {
      background-color: rgba(239, 68, 68, 0.15);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: currentColor;
    }

    .tab-container {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--text-main);
      border-bottom-color: var(--accent);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .form-group {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input, .form-group textarea {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-main);
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
      width: 100%;
    }

    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--accent);
    }

    .form-group textarea {
      resize: none;
      height: 60px;
      font-family: monospace;
      font-size: 11px;
    }

    .btn {
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .btn-secondary {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background-color: #334155;
    }

    .job-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 250px;
      overflow-y: auto;
    }

    .job-item {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .job-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .job-title {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .job-company {
      font-size: 11px;
      color: var(--text-muted);
      margin: 0;
    }

    .platform-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* Platform colors */
    .badge-linkedin { background-color: rgba(10, 102, 194, 0.15); color: #0a66c2; border: 1px solid rgba(10, 102, 194, 0.3); }
    .badge-indeed { background-color: rgba(37, 87, 235, 0.15); color: #2557eb; border: 1px solid rgba(37, 87, 235, 0.3); }
    .badge-naukri { background-color: rgba(255, 117, 39, 0.15); color: #ff7527; border: 1px solid rgba(255, 117, 39, 0.3); }
    .badge-internshala { background-color: rgba(0, 165, 236, 0.15); color: #00a5ec; border: 1px solid rgba(0, 165, 236, 0.3); }
    .badge-glassdoor { background-color: rgba(15, 169, 88, 0.15); color: #0fa958; border: 1px solid rgba(15, 169, 88, 0.3); }
    .badge-greenhouse { background-color: rgba(17, 141, 100, 0.15); color: #118d64; border: 1px solid rgba(17, 141, 100, 0.3); }
    .badge-lever { background-color: rgba(222, 90, 83, 0.15); color: #de5a53; border: 1px solid rgba(222, 90, 83, 0.3); }
    .badge-workday { background-color: rgba(226, 137, 32, 0.15); color: #e28920; border: 1px solid rgba(226, 137, 32, 0.3); }
    .badge-wellfound { background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.2); }
    .badge-instahyre { background-color: rgba(225, 93, 68, 0.15); color: #e15d44; border: 1px solid rgba(225, 93, 68, 0.3); }
    .badge-other { background-color: rgba(148, 163, 184, 0.15); color: var(--text-muted); border: 1px solid rgba(148, 163, 184, 0.3); }

    .empty-state {
      text-align: center;
      padding: 24px 8px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .alert {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .alert-success { background: rgba(16, 185, 129, 0.15); border: 1px solid var(--success); color: #34d399; }
    .alert-error { background: rgba(239, 68, 68, 0.15); border: 1px solid var(--error); color: #f87171; }

    .footer-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1 class="logo">Beacon</h1>
    <div id="statusBadge" class="status-badge disconnected">
      <span class="status-dot"></span>
      <span id="statusText">Not Configured</span>
    </div>
  </header>

  <div class="tab-container">
    <div id="tabHistory" class="tab active">History</div>
    <div id="tabSettings" class="tab">Settings</div>
  </div>

  <div id="alert" class="alert"></div>

  <!-- History Panel -->
  <div id="panelHistory" class="panel active">
    <ul id="jobList" class="job-list">
      <!-- Jobs injected here -->
    </ul>
    <div id="emptyState" class="empty-state" style="display: none;">
      No applications tracked yet.<br>Navigate to a job post to start tracking!
    </div>
  </div>

  <!-- Settings Panel -->
  <div id="panelSettings" class="panel">
    <div style="background-color: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.2); padding: 12px; border-radius: 8px; font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-bottom: 16px;">
      <strong style="color: var(--text-main); display: block; margin-bottom: 4px;">⚡ Zero-Config Auto Sync</strong>
      Open your Beacon dashboard in Chrome (e.g. localhost:3000 or your Vercel URL) to automatically sync your session credentials. No copy-pasting required!
    </div>
    <div class="form-group">
      <label>Connected Dashboard</label>
      <input type="text" id="connectedUrl" readOnly style="opacity: 0.8; cursor: default;" placeholder="Not Synced">
    </div>
    <div class="form-group">
      <label>Session Expiration</label>
      <input type="text" id="sessionExpires" readOnly style="opacity: 0.8; cursor: default;" placeholder="Not Connected">
    </div>
    <button id="btnForceSync" class="btn">Sync Account</button>
  </div>

  <div class="footer-actions">
    <button id="btnOpenDashboard" class="btn btn-secondary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
      Dashboard
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
